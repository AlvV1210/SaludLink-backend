spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:}
  application:
    name: saludlink
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        model: gpt-4o-mini
      embedding:
        model: text-embedding-3-small
    vectorstore:
      pgvector:
        initialize-schema: true
        dimensions: 1536
  datasource:
    url: ${JDBC_DATABASE_URL:${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/saludlink_db}}
    username: ${JDBC_DATABASE_USERNAME:${SPRING_DATASOURCE_USERNAME:postgres}}
    password: ${JDBC_DATABASE_PASSWORD:${SPRING_DATASOURCE_PASSWORD:admin123}}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: ${PORT:${SERVER_PORT:8080}}

jwt:
  secret: ${JWT_SECRET:saludlink-secret-key-2026-muy-segura23}
  expiration: ${JWT_EXPIRATION:86400000}

saludlink:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:5173,https://saludlink.netlify.app}
  telemedicine:
    base-url: ${TELEMEDICINE_BASE_URL:https://meet.saludlink.app}

management:
  endpoints:
    web:
      exposure:
        include: health,info
